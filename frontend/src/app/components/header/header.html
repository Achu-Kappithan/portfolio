<header [class.scrolled]="isScrolled()">
  <div class="container">
    <nav class="navbar">
      <a href="#" class="logo">
        <span class="logo-symbol">&lt;</span>
        <span class="logo-text">Achu Baiju</span>
        <span class="logo-symbol">/&gt;</span>
      </a>

      <ul class="nav-links" [class.active]="isMenuOpen()">
        @for (link of navLinks; track link.label) {
          <li>
            <a [href]="link.href" (click)="closeMenu()">{{ link.label }}</a>
          </li>
        }
      </ul>

      <div class="nav-actions">
        <button (click)="viewResume.emit()" class="btn btn-outline resume-nav-btn">
          Resume
        </button>
        <a href="#contact" class="btn btn-primary hire-btn">Hire Me</a>
      </div>

      <button class="menu-toggle" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen()">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
    </nav>
  </div>
</header>
