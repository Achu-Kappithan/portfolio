<div class="modal-overlay" [class.active]="isOpen()" (click)="close()">
  <div class="modal-container glass-card" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3 class="modal-title">Resume</h3>
      <div class="header-actions">
        <a [href]="resumeUrl" class="btn btn-outline btn-sm download-btn" (click)="close()">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          Download
        </a>
        <button class="close-btn" (click)="close()">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
    </div>
    <div class="modal-body">
      <!-- We use an iframe to preview the Drive PDF. 
           Drive preview link format works well here -->
      <iframe [src]="getSafeUrl()" frameborder="0" allow="autoplay"></iframe>
    </div>
  </div>
</div>
