<div class="resume-viewer-container" [class.active]="isVisible()">
  <div class="viewer-header glass-card">
    <div class="header-left">
      <button class="back-btn" (click)="close()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to Portfolio
      </button>
      <span class="divider"></span>
      <h2 class="viewer-title">Achu_Baiju_Resume.pdf</h2>
    </div>
    
    <div class="header-right">
      <a [href]="resumeDownloadUrl" class="btn btn-primary download-btn" (click)="close()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        Download PDF
      </a>
    </div>
  </div>

  <div class="viewer-content">
    <iframe [src]="getSafeUrl()" frameborder="0"></iframe>
  </div>
</div>
